<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post estilo Reddit</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#0b0b0b;
  color:#fff;
}

a{color:inherit;text-decoration:none;}

.banner{
  width:100%;
  height:220px;
  background-size:cover;
  background-position:center;
  border-bottom:3px solid #d8175f;
}

.main{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:20px;
  padding:20px;
}

.descripcion{
  background:#111;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.descripcion h2{
  color:#d8175f;
  margin-top:0;
}

.sidebar{
  background:#111;
  padding:15px;
  border-radius:10px;
  height:fit-content;
}

.sidebar h3{
  margin-top:0;
  color:#00ff99;
}

.sidebar textarea{
  width:100%;
  min-height:120px;
  background:#0b0b0b;
  color:#fff;
  border:1px solid #333;
  border-radius:6px;
  padding:10px;
  resize:vertical;
}

.sidebar button{
  margin-top:10px;
  width:100%;
  padding:10px;
  background:#d8175f;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.sidebar button:hover{
  background:#ff2f78;
}

/* NOTAS */

.note{
  background:#0f0f0f;
  border:1px solid #222;
  padding:12px;
  border-radius:6px;
  margin-top:10px;
  font-size:14px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.note-text{
  white-space:pre-wrap;
  word-break:break-word;
}

.note button{
  align-self:flex-end;
  background:#333;
  border:none;
  color:#fff;
  padding:4px 8px;
  cursor:pointer;
  border-radius:4px;
}

.post{
  background:#111;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.post h3{
  margin-top:0;
  color:#d8175f;
}

.post p{
  line-height:1.6;
  white-space:pre-line;
}

@media(max-width:900px){
  .main{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="banner" id="banner"></div>

<div class="main">

<div>
<div class="descripcion" id="descripcion"></div>
<div id="posts"></div>
</div>

<div class="sidebar">

<h3>Anotaciones</h3>

<textarea id="noteInput" placeholder="Escribe notas, ideas, spoilers, etc..."></textarea>

<button onclick="guardarNota()">Guardar nota</button>

<div id="notes"></div>

</div>
</div>

<script>

const API="https://anotaciones.jeff7gotosleep.workers.dev";

const pagina={
banner:"https://styles.redditmedia.com/t5_3267i/styles/bannerBackgroundImage_dbow3m72z9j21.jpg?format=pjpg&s=43eb358ff7e9be9c02b64c52eabad66af21cefc6",
descripcion:{
titulo:"NotasKip",
texto:"SubNotes para HK"
},
posts:[
{
titulo:"Pass: 8/3/2026 - 14:47",
texto:"9494",
imagenes:[]
},
{
titulo:"",
texto:"Haz llegado al final de la pagina",
imagenes:[]
}
]
};

document.getElementById("banner").style.backgroundImage=`url(${pagina.banner})`;

const desc=document.getElementById("descripcion");
desc.innerHTML=`
<h2>${pagina.descripcion.titulo}</h2>
<p>${pagina.descripcion.texto}</p>
`;

const contenedorPosts=document.getElementById("posts");

pagina.posts.forEach(post=>{
const div=document.createElement("div");
div.className="post";

let html="";
if(post.titulo) html+=`<h3>${post.titulo}</h3>`;
if(post.texto) html+=`<p>${post.texto}</p>`;

div.innerHTML=html;
contenedorPosts.appendChild(div);
});


/* =======================
CARGAR NOTAS
======================= */

async function cargarNotas(){

const res=await fetch(API);
const notas=await res.json();

const cont=document.getElementById("notes");
cont.innerHTML="";

notas.reverse().forEach(n=>{

const d=document.createElement("div");
d.className="note";

d.innerHTML=`
<div class="note-text">${n.text}</div>
<button onclick="borrarNota(${n.id})">Eliminar</button>
`;

cont.appendChild(d);

});

}


/* =======================
GUARDAR NOTA
======================= */

async function guardarNota(){

const input=document.getElementById("noteInput");

if(!input.value.trim()) return;

await fetch(API,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({text:input.value})
});

input.value="";

cargarNotas();

}


/* =======================
BORRAR NOTA (ARREGLADO)
======================= */

async function borrarNota(id){

await fetch(API,{
method:"DELETE",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({id:id})
});

cargarNotas();

}

cargarNotas();

</script>

</body>
</html>
